<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GalaxyGaming</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geomini:wght@200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <nav class="header-nav">
        <form action="#" class="head-form">
          <div class="head-logo"><a href="#">GalaxyGaming</a></div>
          <div class="search-box">
            <input
              class="search-input"
              type="search"
              name="search"
              placeholder="Search..."
            />
            <button class="search-submit" type="submit">
              <i data-lucide="search"></i>
            </button>
          </div>
          <div class="nav-end">
            <button class="theme-toggle" type="button"><i class="i" data-lucide="sun-moon"></i></button>
            <a class="basket-link" href="#basket"><i class="i" data-lucide="shopping-basket"></i></a>
            <a class="login-link" href="#log"><i class="i" data-lucide="clipboard-pen"></i></a>
            <a class="profile-link" href="#profile"><i class="i" data-lucide="circle-user-round"></i></a>
          </div>
        </form>
      </nav>
      <div class="main">
        <nav>
          <li><a href="#">Home</a></li>
          <li><a href="#">Category</a></li>
          <li><a href="#">New Releasi</a></li>
          <li><a href="#">Up Coming</a></li>
          <li><a href="#">Old Gold</a></li>
          <li><a href="#">FPP Games</a></li>
          <li><a href="#">TPP Games</a></li>
          <li><a href="#">CO-OP</a></li>
        </nav>
        <div class="main-contact">
          <div class="c1">
            <a href="#">
              <i class="i" data-lucide="heart"></i>
              <div class="wishlist">Wishlist</div>
            </a>
          </div>
          <div class="c2">
            <a href="#">
              <i class="i" data-lucide="download"></i>
              <div class="download">Downloaded</div>
            </a>
          </div>
        </div>
      </div>
    </header>


    <aside class="aside">
        
    </aside>


    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
<script src="javascript/script.js"></script>
